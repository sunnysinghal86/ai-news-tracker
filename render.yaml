services:
  - type: web
    name: ai-signal-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: "AI Signal <digest@ai-signal.app>"
      - key: TURSO_URL       # libsql://your-db.turso.io
        sync: false
      - key: TURSO_TOKEN     # from: turso db tokens create ai-signal
        sync: false
      - key: DB_PATH         # fallback for local dev only
        value: /tmp/news_tracker.db
      - key: APP_URL
        value: https://ai-signal.app
      - key: API_URL
        value: https://api.ai-signal.app
      - key: ADMIN_EMAIL      # your email — receives subscriber approval requests
        sync: false
      - key: SEED_SUBSCRIBERS
        sync: false

  - type: web
    name: ai-signal-frontend
    runtime: static
    region: oregon
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://api.ai-signal.app
